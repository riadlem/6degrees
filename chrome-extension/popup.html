<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>6Degrees Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
    }
    .header {
      background: #0A66C2;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-logo {
      width: 28px; height: 28px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .header h1 { color: #fff; font-size: 15px; font-weight: 700; }
    .header p { color: rgba(255,255,255,0.75); font-size: 11px; margin-top: 1px; }

    .body { padding: 16px; }
    .field { margin-bottom: 14px; }
    label { display: block; font-size: 11px; font-weight: 600; color: #666; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
    input {
      width: 100%;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      font-family: inherit;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #0A66C2; }
    input::placeholder { color: #aaa; }

    .btn {
      width: 100%;
      background: #0A66C2;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .btn:hover { background: #004182; }

    .status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
    }
    .status.ok { color: #16a34a; }
    .status.err { color: #dc2626; }

    .divider { height: 1px; background: #f0f0f0; margin: 14px 0; }

    .hint {
      font-size: 11px;
      color: #888;
      line-height: 1.5;
    }
    .hint a { color: #0A66C2; text-decoration: none; }
    .hint a:hover { text-decoration: underline; }

    .status-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-right: 5px;
      background: #d1d5db;
    }
    .status-dot.connected { background: #22c55e; }
    .status-dot.error { background: #ef4444; }
    .connection-status { font-size: 11px; color: #666; display: flex; align-items: center; margin-top: 8px; }

    .update-banner {
      display: none;
      margin: 0 0 12px;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 11px;
      line-height: 1.5;
    }
    .update-banner.reload {
      background: #fffbeb;
      border: 1px solid #f59e0b;
      color: #92400e;
    }
    .update-banner.reinstall {
      background: #fef2f2;
      border: 1px solid #ef4444;
      color: #991b1b;
    }
    .update-banner strong { display: block; margin-bottom: 2px; }
    .update-banner a { color: inherit; font-weight: 600; }

    .version-line { font-size: 10px; color: #bbb; text-align: center; margin-top: 10px; }

    /* ── Profile debug panel ── */
    #profilePanel { margin-top: 4px; }
    .panel-title {
      font-size: 11px; font-weight: 700; color: #444;
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
    }
    .panel-title span { color: #0A66C2; }
    .dbg-row {
      display: flex; gap: 6px; margin-bottom: 4px; font-size: 12px; line-height: 1.4;
    }
    .dbg-label {
      flex: 0 0 56px; font-weight: 600; color: #888; font-size: 11px;
      padding-top: 1px;
    }
    .dbg-val {
      flex: 1; color: #1a1a1a; word-break: break-word;
    }
    .dbg-val.ok { color: #16a34a; }
    .dbg-val.err { color: #dc2626; }
    .dbg-val.warn { color: #d97706; }
    .dbg-log-wrap { margin-top: 8px; }
    .dbg-log-toggle {
      font-size: 11px; color: #0A66C2; cursor: pointer; background: none;
      border: none; padding: 0; font-family: inherit;
    }
    #dbg-log {
      display: none; width: 100%; margin-top: 6px;
      border: 1.5px solid #e5e7eb; border-radius: 6px;
      padding: 7px 8px; font-size: 10px; font-family: monospace;
      color: #444; background: #fafafa; resize: none; line-height: 1.45;
      box-sizing: border-box;
    }
    .copy-row { display: flex; gap: 6px; margin-top: 7px; }
    .btn-sm {
      flex: 1; background: #f3f4f6; color: #374151;
      border: 1.5px solid #e5e7eb; border-radius: 7px;
      padding: 6px 10px; font-size: 11px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    .btn-sm:hover { background: #e5e7eb; }
    .btn-sm.primary { background: #0A66C2; color: #fff; border-color: #0A66C2; }
    .btn-sm.primary:hover { background: #004182; }
    #scrapeStatus { font-size: 11px; color: #888; font-style: italic; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="3" fill="white"/>
        <circle cx="4" cy="6" r="2.5" fill="white"/>
        <circle cx="20" cy="6" r="2.5" fill="white"/>
        <circle cx="4" cy="18" r="2.5" fill="white"/>
        <circle cx="20" cy="18" r="2.5" fill="white"/>
        <line x1="6.2" y1="7.3" x2="10.2" y2="10.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="17.8" y1="7.3" x2="13.8" y2="10.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="6.2" y1="16.7" x2="10.2" y2="13.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="17.8" y1="16.7" x2="13.8" y2="13.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <h1>6Degrees</h1>
      <p>LinkedIn profile capture &nbsp;·&nbsp; <span id="headerVersion" style="opacity:0.85"></span></p>
    </div>
  </div>

  <div class="body">
    <div id="updateBanner" class="update-banner"></div>

    <div class="field">
      <label>6Degrees URL</label>
      <input id="apiUrl" type="url" placeholder="https://your-app.vercel.app" />
    </div>

    <div class="field">
      <label>Extension Token</label>
      <input id="apiToken" type="password" placeholder="Paste your token from Settings" />
      <div class="connection-status" id="connectionStatus">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Not configured</span>
      </div>
    </div>

    <div class="field" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <label style="margin:0;text-transform:none;letter-spacing:normal;font-size:12px;font-weight:500;color:#444">Auto-queue visited profiles</label>
      <input id="autoQueue" type="checkbox" style="width:auto;border:none;padding:0;accent-color:#0A66C2;width:15px;height:15px;cursor:pointer" />
    </div>

    <button class="btn" id="saveBtn">Save settings</button>
    <div class="status" id="status"></div>

    <div class="divider"></div>

    <!-- Profile debug panel — shown only when popup opens on a LinkedIn /in/ page -->
    <div id="profilePanel" style="display:none">
      <div class="panel-title">📋 Scraped on this page <span id="scrapeStatus"></span></div>
      <div class="dbg-row"><span class="dbg-label">Name</span><span id="dbg-name" class="dbg-val">—</span></div>
      <div class="dbg-row"><span class="dbg-label">Company</span><span id="dbg-company" class="dbg-val">—</span></div>
      <div class="dbg-row"><span class="dbg-label">Role</span><span id="dbg-role" class="dbg-val">—</span></div>
      <div class="dbg-row"><span class="dbg-label">Photo</span><span id="dbg-photo" class="dbg-val">—</span></div>
      <div class="dbg-row"><span class="dbg-label">Headline</span><span id="dbg-headline" class="dbg-val">—</span></div>
      <div class="dbg-log-wrap">
        <button class="dbg-log-toggle" id="toggleLog">▶ raw log</button>
        <textarea id="dbg-log" rows="7" readonly></textarea>
      </div>
      <div class="copy-row">
        <button class="btn-sm" id="copy-debug">Copy log</button>
        <button class="btn-sm" id="copy-all">Copy all fields</button>
        <button class="btn-sm primary" id="rescrape-btn">↻ Re-scrape</button>
      </div>
      <div class="divider"></div>
    </div>

    <p class="hint">
      Get your token at <strong>6Degrees → Settings</strong>.<br />
      On a LinkedIn <code>/in/</code> profile, click <strong>Save to 6Degrees</strong>.
    </p>
    <p class="version-line" id="versionLine">v<span id="installedVersion"></span></p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
